<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica ingrediente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f3ee; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 800px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; color: #444; }
        input, select { display:block; width:100%; max-width:500px; margin-top:4px; margin-bottom:4px; padding:8px; box-sizing:border-box; }
        button { background:#8b5a2b; color:white; border:none; padding:10px 16px; border-radius:6px; cursor:pointer; margin-top:16px; }
        button:hover { background:#6f451f; }
        a { color:#8b5a2b; text-decoration:none; font-weight:bold; }
        h2 { color:#5a381e; margin-top: 24px; border-top: 1px solid #ddd; padding-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Modifica ingrediente</h1>
        <p><a href="/ricette/{{ ing.ricetta_id }}">← Torna alla ricetta</a></p>

        <form method="post" action="/ingredienti/{{ ing.id }}/modifica">
            <label>Nome</label>
            <input type="text" name="nome" value="{{ ing.nome }}" required>

            <label>Categoria</label>
            <select name="categoria" required>
                <option value="grain" {% if ing.categoria == 'grain' %}selected{% endif %}>Grain</option>
                <option value="hop" {% if ing.categoria == 'hop' %}selected{% endif %}>Hop</option>
                <option value="yeast" {% if ing.categoria == 'yeast' %}selected{% endif %}>Yeast</option>
                <option value="misc" {% if ing.categoria == 'misc' %}selected{% endif %}>Misc</option>
            </select>

            <label>Quantità</label>
            <input type="number" step="0.001" name="quantita" value="{{ ing.quantita }}" required>

            <label>Unità</label>
            <select name="unita">
                <option value="kg" {% if ing.unita == 'kg' %}selected{% endif %}>kg</option>
                <option value="g" {% if ing.unita == 'g' %}selected{% endif %}>g</option>
                <option value="l" {% if ing.unita == 'l' %}selected{% endif %}>l</option>
                <option value="ml" {% if ing.unita == 'ml' %}selected{% endif %}>ml</option>
                <option value="pz" {% if ing.unita == 'pz' %}selected{% endif %}>pz</option>
                <option value="oz" {% if ing.unita == 'oz' %}selected{% endif %}>oz</option>
                <option value="lb" {% if ing.unita == 'lb' %}selected{% endif %}>lb</option>
            </select>

            <label>Tempo (minuti)</label>
            <input type="number" name="time_min" value="{{ ing.time_min or '' }}" placeholder="es. 60">

            <label>Note</label>
            <input type="text" name="note" value="{{ ing.note or '' }}">

            <h2>Dati tecnici Grain</h2>
            <label>Fermentable type</label>
            <input type="text" name="fermentable_type" value="{{ ing.fermentable_type or '' }}">
            <label>Yield %</label>
            <input type="number" step="0.1" name="yield_percent" value="{{ ing.yield_percent or '' }}">
            <label>Color SRM</label>
            <input type="number" step="0.1" name="color_srm" value="{{ ing.color_srm or '' }}">

            <h2>Dati tecnici Hop</h2>
            <label>Alpha acid %</label>
            <input type="number" step="0.1" name="alpha_acid" value="{{ ing.alpha_acid or '' }}">
            <label>Hop use</label>
            <input type="text" name="hop_use" value="{{ ing.hop_use or '' }}">
            <label>Hop form</label>
            <input type="text" name="hop_form" value="{{ ing.hop_form or '' }}">

            <h2>Dati tecnici Yeast</h2>
            <label>Attenuation %</label>
            <input type="number" step="0.1" name="attenuation" value="{{ ing.attenuation or '' }}">
            <label>Yeast type</label>
            <input type="text" name="yeast_type" value="{{ ing.yeast_type or '' }}">
            <label>Yeast form</label>
            <input type="text" name="yeast_form" value="{{ ing.yeast_form or '' }}">

            <h2>Dati tecnici Misc</h2>
            <label>Misc type</label>
            <input type="text" name="misc_type" value="{{ ing.misc_type or '' }}">
            <label>Misc use</label>
            <input type="text" name="misc_use" value="{{ ing.misc_use or '' }}">

            <button type="submit">Salva modifiche</button>
        </form>
    </div>
</body>
</html>
