<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Nuovo ingrediente catalogo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f3ee; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 800px; }
        input, select { display:block; width:100%; max-width:500px; margin-bottom:10px; padding:8px; }
        button { background:#8b5a2b; color:white; border:none; padding:10px 16px; border-radius:6px; cursor:pointer; }
        a { color:#8b5a2b; text-decoration:none; font-weight:bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nuovo ingrediente catalogo</h1>
        <p><a href="/catalogo/ingredienti">Torna al catalogo</a></p>

        <form method="post" action="/catalogo/ingredienti/nuovo">
            <input type="text" name="nome" placeholder="Nome ingrediente" required>

            <select name="categoria" required>
                <option value="grain">Grain</option>
                <option value="hop">Hop</option>
                <option value="yeast">Yeast</option>
                <option value="misc">Misc</option>
            </select>

            <input type="text" name="fermentable_type" placeholder="Fermentable type">
            <input type="number" step="0.1" name="yield_percent" placeholder="Yield %">
            <input type="number" step="0.1" name="color_srm" placeholder="Color SRM">

            <input type="number" step="0.1" name="alpha_acid" placeholder="Alpha acid %">
            <input type="text" name="hop_use" placeholder="Hop use">
            <input type="text" name="hop_form" placeholder="Hop form">

            <input type="number" step="0.1" name="attenuation" placeholder="Attenuation %">
            <input type="text" name="yeast_type" placeholder="Yeast type">
            <input type="text" name="yeast_form" placeholder="Yeast form">

            <input type="text" name="misc_type" placeholder="Misc type">
            <input type="text" name="misc_use" placeholder="Misc use">

            <button type="submit">Salva ingrediente</button>
        </form>
    </div>
</body>
</html>
