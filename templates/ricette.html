{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Ricette</h1>
  <p class="muted">Inserisci e visualizza le ricette salvate.</p>

  <form method="post" action="/ricette/nuova">
    <input type="text" name="nome" placeholder="Nome ricetta" required>
    <input type="text" name="stile" placeholder="Stile">
    <textarea name="descrizione" placeholder="Descrizione"></textarea>
    <input type="number" step="0.1" name="litri" placeholder="Litri">
    <button type="submit">Salva ricetta</button>
  </form>
</div>

<div class="grid">
  {% for r in ricette %}
  <div class="card">
    <h3>{{ r.nome }}</h3>
    <p>{{ r.stile or '' }}</p>
    <p>{{ r.descrizione or '' }}</p>
    <p>{{ r.litri or '' }} L</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
