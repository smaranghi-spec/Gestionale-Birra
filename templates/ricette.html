{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Ricette</h1>
  <form method="post" action="/ricette/nuova">
    <input type="text" name="nome" placeholder="Nome ricetta" required style="width:100%;padding:10px;margin-bottom:8px;">
    <input type="text" name="stile" placeholder="Stile" style="width:100%;padding:10px;margin-bottom:8px;">
    <textarea name="descrizione" placeholder="Descrizione" style="width:100%;padding:10px;margin-bottom:8px;min-height:90px;"></textarea>
    <input type="number" step="0.1" name="litri" placeholder="Litri" style="width:100%;padding:10px;margin-bottom:8px;">
    <button type="submit">Salva ricetta</button>
  </form>
</div>

<div class="grid">
  {% for r in ricette %}
  <div class="card">
    <h3>{{ r.nome }}</h3>
    <p>{{ r.stile or '' }}</p>
    <p>{{ r.descrizione or '' }}</p>
    <p>{{ r.litri or '' }} L</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
